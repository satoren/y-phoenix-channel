name: NPM Package CI

on:
  push:
    branches:
      - main
    paths:
      - "npm/y-phoenix-channel/**"
      - ".github/workflows/npm-package-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "npm/y-phoenix-channel/**"
      - ".github/workflows/npm-package-ci.yml"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/y-phoenix-channel
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: npm/y-phoenix-channel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: npm/y-phoenix-channel

      - name: Type check
        run: npm run typecheck
        working-directory: npm/y-phoenix-channel

      - name: Build
        run: npm run build
        working-directory: npm/y-phoenix-channel

      - name: Run tests
        run: npm test -- --run
        working-directory: npm/y-phoenix-channel
