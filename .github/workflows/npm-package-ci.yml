name: NPM Package CI

on:
  push:
    branches:
      - main
    paths:
      - "npm/y-phoenix-channel/**"
      - ".github/workflows/npm-package-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "npm/y-phoenix-channel/**"
      - ".github/workflows/npm-package-ci.yml"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/y-phoenix-channel
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: npm/y-phoenix-channel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: npm/y-phoenix-channel

      - name: Type check
        run: npm run typecheck
        working-directory: npm/y-phoenix-channel

      - name: Build
        run: npm run build
        working-directory: npm/y-phoenix-channel

      - name: Run tests
        run: npm test -- --run
        working-directory: npm/y-phoenix-channel
